<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hosting Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8' }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .log-box { font-family: 'Courier New', monospace; font-size: 12px; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- AUTH PAGE -->
  <div id="authPage" class="flex items-center justify-center min-h-screen px-4">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div class="text-4xl mb-2">🚀</div>
        <h1 class="text-3xl font-bold text-white">Hosting Panel</h1>
        <p class="text-gray-400 mt-1">Deploy app kamu dalam hitungan detik</p>
      </div>

      <div class="bg-gray-900 rounded-2xl p-8 shadow-2xl border border-gray-800">
        <!-- Tab -->
        <div class="flex mb-6 bg-gray-800 rounded-lg p-1">
          <button onclick="showTab('login')" id="tabLogin"
            class="flex-1 py-2 rounded-md text-sm font-medium transition-all bg-blue-600 text-white">
            Login
          </button>
          <button onclick="showTab('register')" id="tabRegister"
            class="flex-1 py-2 rounded-md text-sm font-medium transition-all text-gray-400">
            Register
          </button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
          <div class="space-y-4">
            <input id="loginEmail" type="email" placeholder="Email"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 text-white placeholder-gray-500" />
            <input id="loginPassword" type="password" placeholder="Password"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 text-white placeholder-gray-500" />
            <button onclick="doLogin()"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors">
              Login
            </button>
          </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden">
          <div class="space-y-4">
            <input id="regUsername" type="text" placeholder="Username (hanya huruf/angka/_)"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 text-white placeholder-gray-500" />
            <input id="regEmail" type="email" placeholder="Email"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 text-white placeholder-gray-500" />
            <input id="regPassword" type="password" placeholder="Password (min 8 karakter)"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 text-white placeholder-gray-500" />
            <button onclick="doRegister()"
              class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition-colors">
              Daftar Sekarang
            </button>
          </div>
        </div>

        <div id="authError" class="hidden mt-4 text-red-400 text-sm text-center bg-red-900/30 rounded-lg py-2 px-3"></div>
      </div>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div id="mainPanel" class="hidden">
    <!-- Navbar -->
    <nav class="bg-gray-900 border-b border-gray-800 px-4 py-3">
      <div class="max-w-6xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-2xl">🚀</span>
          <span class="font-bold text-lg">Hosting Panel</span>
        </div>
        <div class="flex items-center gap-4">
          <span class="text-gray-400 text-sm" id="navUsername"></span>
          <button onclick="showPage('apps')" id="navApps"
            class="text-sm px-3 py-1.5 rounded-lg bg-blue-600 text-white">Apps</button>
          <button onclick="showPage('domains')" id="navDomains"
            class="text-sm px-3 py-1.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-800">Domains</button>
          <button onclick="showPage('admin')" id="navAdmin"
            class="hidden text-sm px-3 py-1.5 rounded-lg text-yellow-400 hover:bg-gray-800">Admin</button>
          <button onclick="doLogout()"
            class="text-sm px-3 py-1.5 rounded-lg text-gray-400 hover:text-red-400 hover:bg-gray-800">Logout</button>
        </div>
      </div>
    </nav>

    <!-- Content -->
    <main class="max-w-6xl mx-auto px-4 py-6">

      <!-- APPS PAGE -->
      <div id="pageApps">
        <!-- Info subdomain user -->
        <div class="bg-blue-900/30 border border-blue-700/50 rounded-xl p-4 mb-6">
          <div class="flex items-center gap-3">
            <span class="text-2xl">🌐</span>
            <div>
              <p class="text-sm text-blue-300">Subdomain gratis kamu:</p>
              <p class="font-mono text-blue-200" id="userSubdomain">-</p>
            </div>
          </div>
        </div>

        <!-- Create App -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 mb-6">
          <h2 class="text-lg font-semibold mb-4">➕ Buat App Baru</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <input id="newAppName" type="text" placeholder="Nama app (contoh: tokoku)"
              class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 text-white placeholder-gray-500" />
            <select id="newAppType"
              class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 text-white">
              <option value="nodejs">Node.js</option>
              <option value="python">Python</option>
            </select>
            <input id="newAppCmd" type="text" placeholder="Start command (opsional)"
              class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 text-white placeholder-gray-500" />
          </div>
          <button onclick="createApp()"
            class="mt-3 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium transition-colors">
            Buat App
          </button>
          <div id="appCreateMsg" class="hidden mt-2 text-sm"></div>
        </div>

        <!-- App List -->
        <h2 class="text-lg font-semibold mb-3">📦 App Kamu</h2>
        <div id="appList" class="space-y-3">
          <div class="text-gray-500 text-center py-8">Memuat...</div>
        </div>
      </div>

      <!-- DOMAINS PAGE -->
      <div id="pageDomains" class="hidden">
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 mb-6">
          <h2 class="text-lg font-semibold mb-4">🌐 Tambah Domain Custom</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <select id="domainAppId"
              class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 text-white">
              <option value="">Pilih app...</option>
            </select>
            <input id="customDomain" type="text" placeholder="contoh: tokonya.com"
              class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 text-white placeholder-gray-500" />
          </div>
          <button onclick="addCustomDomain()"
            class="mt-3 bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-lg font-medium transition-colors">
            Tambah Domain
          </button>
          <div id="domainMsg" class="hidden mt-3 p-3 rounded-lg text-sm"></div>
        </div>

        <h2 class="text-lg font-semibold mb-3">📋 Domain Terdaftar</h2>
        <div id="domainList" class="space-y-3">
          <div class="text-gray-500 text-center py-8">Memuat...</div>
        </div>
      </div>

      <!-- ADMIN PAGE -->
      <div id="pageAdmin" class="hidden">
        <!-- Stats -->
        <div id="adminStats" class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6"></div>

        <h2 class="text-lg font-semibold mb-3">👥 Semua User</h2>
        <div id="adminUserList" class="space-y-3"></div>
      </div>

    </main>
  </div>

  <!-- LOGS MODAL -->
  <div id="logsModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-gray-900 rounded-xl w-full max-w-3xl max-h-[80vh] flex flex-col border border-gray-700">
      <div class="flex items-center justify-between p-4 border-b border-gray-700">
        <h3 class="font-semibold" id="logsTitle">Logs</h3>
        <button onclick="closeModal('logsModal')" class="text-gray-400 hover:text-white text-xl">&times;</button>
      </div>
      <div class="flex-1 overflow-auto p-4">
        <pre id="logsContent" class="log-box text-green-400 whitespace-pre-wrap text-xs">Loading...</pre>
      </div>
      <div class="p-4 border-t border-gray-700">
        <button onclick="refreshLogs()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm">
          🔄 Refresh
        </button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
